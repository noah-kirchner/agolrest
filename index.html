<!DOCTYPE html>
<html lang="en">
<head>
  <title>GEOG576 Lab 2</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />
  
  <!-- ArcGIS Maps SDK -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .esri-ui .esri-component {
      transform: scale(1.3);
      transform-origin: top left;
    }

    .esri-search__input {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 15px;
      height: 42px;
    }

    .esri-search {
      width: 280px;
    }

    .esri-widget--button {
      width: 42px;
      height: 42px;
      font-size: 18px;
    }

    .esri-icon {
      font-size: 18px;
    }

    .esri-basemap-gallery {
      width: 260px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .esri-basemap-gallery__item-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
    }

    .basemap-expand .esri-expand__text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
    }

    .basemap-expand {
      margin-top: 20px;
    }

    .esri-ui-top-right,
    .esri-ui-bottom-right {
      right: 15px;
    }

    .esri-ui-bottom-right {
      bottom: 30px;
    }
    .esri-popup__content {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .esri-popup__header-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .toggle-panel {
      background: white;
      padding: 10px 14px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      position: relative;
      left: auto;
      right: 0;
      float: right;
    }

    .toggle-panel input {
      cursor: pointer;
      width: 14px;
      height: 14px;
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

  <script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/Basemap",
    "esri/layers/VectorTileLayer",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Expand",
    "esri/widgets/Locate",
    "esri/widgets/Search",
    "esri/widgets/Zoom",
    "esri/identity/IdentityManager",
    "esri/Graphic",
    "esri/layers/GraphicsLayer",
    "esri/layers/FeatureLayer",
    "esri/widgets/Editor",
    "esri/widgets/Legend"
  ], function(esriConfig, Map, MapView, Basemap, VectorTileLayer, BasemapGallery, Expand, Locate, Search, Zoom, esriId, Graphic, GraphicsLayer, FeatureLayer, Editor, Legend) {
    esriConfig.apiKey = "AAPTahTxVFpq9q8MnwLiObY9CFA..GevNuz4SYr30TZAqUePx7AbFVJwzZ-75HZibp8q8X_hA6TPW8HykfyNv5UHSBrihV7wxRIuKMljM6Td7CGL-I-NoeohsNNN5-DscbLXxR160xjEKWljGwLKFTpbzjgKaCifG2LdFV6cjTrLyMfUN-QAwkcjGsxBAqrSoOkHtwm_Dp1Xq27w69mwKCTvvpkW7gCybTou8IRHbLRUoFRW1eICV-wSPJ2lBluUTLPvrOLmOa-qtmDDRDzd5yR7OMvH6f8I9I7fFzw..AT1_IMV5kkt8";

    esriId.registerToken({
      server: "https://basemapstyles-api.arcgis.com",
      token: esriConfig.apiKey
    });

    const communityBasemap = new Basemap({
      baseLayers: [
        new VectorTileLayer({
          url: "https://basemapstyles-api.arcgis.com/arcgis/rest/services/styles/v2/styles/arcgis/community"
        })
      ],
      title: "Community",
      id: "community"
    });

    const map = new Map({
      basemap: "arcgis-light-gray"
    });

    const view = new MapView({
      map: map,
      center: [-77.0264, 38.89],
      zoom: 14,
      container: "viewDiv",
      ui: {
        components: []
      }
    });

    // --- GraphicsLayer ---
    const graphicsLayer = new GraphicsLayer();
    map.add(graphicsLayer);

    // Point coordinates source: Google Maps
    const point = {
      type: "point",
      longitude: -77.035254,
      latitude: 38.88946
    };

    const simpleMarkerSymbol = {
      type: "simple-marker",
      style: "diamond",  // Lab 2, Challenge 1: non-circle shape
      color: "#7FB77E",
      size: "24px",
      outline: {
        color: [255, 255, 255],
        width: 2
      }
    };

    const popupTemplate = {
      title: "{Name}",
      content: "{Description}"
    };

    const attributes = {
      Name: "Washington Monument",
      Description: "Dedicated to our first president, it was the world's tallest structure when completed in 1884. Those who grew up around here call it the pencil."
    };

    const pointGraphic = new Graphic({
      geometry: point,
      symbol: simpleMarkerSymbol,
      attributes: attributes,
      popupTemplate: popupTemplate
    });

    graphicsLayer.add(pointGraphic);

    // Data source for coordinates: Google Maps
    const polyline = {
      type: "polyline",
      paths: [
        [-77.036563, 38.897201],  // White House end of PA Ave
        [-77.010321, 38.890088]   // Capitol end of PA Ave
      ]
    };

    const polylineSymbol = {
      type: "simple-line",
      color: "#FAA61F",
      width: 8
    };

    const polylineAttributes = {
      Name: "Pennsylvania Avenue NW",
      Description: "The iconic street connecting the White House to the Capitol. Watch out for tourists on scooters!"
    };

    const polylineGraphic = new Graphic({
      geometry: polyline,
      symbol: polylineSymbol,
      attributes: polylineAttributes,
      popupTemplate: popupTemplate
    });

    graphicsLayer.add(polylineGraphic);

    // Data source for coordinates: Google Maps
    const polygon = {
      type: "polygon",
      rings: [
        [-77.048239, 38.889524],  // NW Corner
        [-77.048245, 38.889085],  // SW Corner
        [-77.041111, 38.889179],  // SE Corner
        [-77.041117, 38.889625],  // NE Corner
        [-77.048239, 38.889524]   // Close the ring
      ]
    };

    const polygonSymbol = {
      type: "simple-fill",
      color: [92, 127, 163, 0.2],
      outline: {
        color: "#5C7FA3",
        width: 3
      }
    };

    const polygonAttributes = {
      Name: "Lincoln Memorial Reflecting Pool",
      Description: "While it is a pool, swimming in it is a real quick way to meet the Secret Service or Park Police."
    };

    const polygonGraphic = new Graphic({
      geometry: polygon,
      symbol: polygonSymbol,
      attributes: polygonAttributes,
      popupTemplate: popupTemplate
    });

    graphicsLayer.add(polygonGraphic);

    // --- FeatureLayer: OSM North America Tourism ---
    // Data source: OpenStreetMap via ArcGIS Living Atlas
    // REST URL: https://services6.arcgis.com/Do88DoK2xjTUCXd1/arcgis/rest/services/OSM_NA_Tourism/FeatureServer
    const popupTourism = {
      title: "{name}",
      content: function(feature) {
        const a = feature.graphic.attributes;
        let html = "";

        if (a.tourism)        html += "<b>Type:</b> " + a.tourism + "<br>";
        if (a.description)    html += "<b>Description:</b> " + a.description + "<br>";
        
        const address = [a.addr_housenumber, a.addr_street, a.addr_city].filter(Boolean).join(" ");
        if (address)          html += "<b>Address:</b> " + address + "<br>";
        
        if (a.opening_hours)  html += "<b>Hours:</b> " + a.opening_hours + "<br>";
        if (a.phone)          html += "<b>Phone:</b> " + a.phone + "<br>";
        if (a.website)        html += "<br><a href='" + a.website + "' target='_blank' style='color:#5C7FA3; font-weight:bold;'>Visit Website →</a>";

        return html || "No details available.";
      }
    };

    const tourismRenderer = {
      type: "simple",
      symbol: {
        type: "simple-marker",
        style: "circle",
        color: "#FAA61F",
        size: "8px",
        outline: {
          color: "#ffffff",
          width: 1
        }
      }
    };

    const tourismLayer = new FeatureLayer({
      url: "https://services6.arcgis.com/Do88DoK2xjTUCXd1/arcgis/rest/services/OSM_NA_Tourism/FeatureServer",
      outFields: ["name", "tourism", "description", "addr_housenumber", "addr_street", "addr_city", "opening_hours", "phone", "website"],
      popupTemplate: popupTourism,
      renderer: tourismRenderer,
      definitionExpression: "name IS NOT NULL AND name <> ''"
    });

    map.add(tourismLayer);

    // --- FeatureLayer: US Airports (self-hosted on AGOL) ---
    // Data source: US Airports shapefile uploaded to AGOL by Noah Kirchner
    // REST URL: https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/US_Airports1/FeatureServer
    const popupAirports = {
      title: "{Fac_Name}",
      content: function(feature) {
        const a = feature.graphic.attributes;
        let html = "";

        if (a.City && a.State_Name)   html += "<b>Location:</b> " + a.City + ", " + a.State_Name + "<br>";
        if (a.Fac_Type)               html += "<b>Type:</b> " + a.Fac_Type + "<br>";
        if (a.Owner_Type)             html += "<b>Ownership:</b> " + a.Owner_Type + "<br>";
        if (a.Elevation)              html += "<b>Elevation:</b> " + a.Elevation + " ft<br>";
        if (a.Atc_Tower)              html += "<b>ATC Tower:</b> " + a.Atc_Tower + "<br>";
        if (a.Fuel_Types)             html += "<b>Fuel:</b> " + a.Fuel_Types + "<br>";

        return html || "No details available.";
      }
    };

    const airportRenderer = {
      type: "simple",
      symbol: {
        type: "picture-marker",
        url: "https://noah-kirchner.github.io/agol/airplane.png",
        width: "18px",
        height: "18px"
      }
    };

    const airportLabels = {
      symbol: {
        type: "text",
        color: "#FFFFFF",
        haloColor: "#5C7FA3",
        haloSize: "2px",
        font: {
          size: "12px",
          family: "Noto Sans",
          style: "italic",
          weight: "normal"
        }
      },
      labelPlacement: "above-center",
      labelExpressionInfo: {
        expression: "$feature.Fac_Name"
      }
    };

    const heliportRenderer = {
      type: "simple",
      symbol: {
        type: "picture-marker",
        url: "https://noah-kirchner.github.io/agol/helicopter.png",
        width: "18px",
        height: "18px"
      }
    };

    const heliportLabels = {
      symbol: {
        type: "text",
        color: "#FFFFFF",
        haloColor: "#7FB77E",
        haloSize: "2px",
        font: {
          size: "12px",
          family: "Noto Sans",
          style: "italic",
          weight: "normal"
        }
      },
      labelPlacement: "above-center",
      labelExpressionInfo: {
        expression: "$feature.Fac_Name"
      }
    };

    const airportsLayer = new FeatureLayer({
      url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/US_Airports1/FeatureServer",
      outFields: ["Fac_Name", "City", "State_Name", "Fac_Type", "Owner_Type", "Elevation", "Atc_Tower", "Fuel_Types"],
      renderer: airportRenderer,
      definitionExpression: "Fac_Type = 'AIRPORT'",
      labelingInfo: [airportLabels],
      popupTemplate: popupAirports
    });

    const heliportsLayer = new FeatureLayer({
      url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/US_Airports1/FeatureServer",
      outFields: ["Fac_Name", "City", "State_Name", "Fac_Type", "Owner_Type", "Elevation", "Atc_Tower", "Fuel_Types"],
      renderer: heliportRenderer,
      definitionExpression: "Fac_Type = 'HELIPORT'",
      labelingInfo: [heliportLabels],
      popupTemplate: popupAirports
    });

    map.add(airportsLayer);
    map.add(heliportsLayer);

    // --- FeatureLayer: My Visited Airports ---
    // Data source: Custom feature layer created by Noah Kirchner on AGOL
    // REST URL: https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/My_Airports_Kirchner/FeatureServer

    // Challenge 1: Custom icon for visited airports
    const myAirportRenderer = {
      type: "simple",
      symbol: {
        type: "picture-marker",
        url: "https://noah-kirchner.github.io/agolrest/images/airplane.png",
        width: "24px",
        height: "24px"
      }
    };

    // Challenge 2: Label showing airport code
    const myAirportLabels = {
      symbol: {
        type: "text",
        color: "#FFFFFF",
        haloColor: "#7FB77E",
        haloSize: "2px",
        font: {
          size: "12px",
          family: "Noto Sans",
          style: "italic",
          weight: "normal"
        }
      },
      labelPlacement: "above-center",
      labelExpressionInfo: {
        expression: "$feature.AirportCode"
      }
    };

    const myAirports = new FeatureLayer({
      url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/My_Airports_Kirchner/FeatureServer",
      outFields: ["AirportCode"],
      renderer: myAirportRenderer,
      labelingInfo: [myAirportLabels]
    });

    map.add(myAirports);

    // Editor widget wrapped in Expand for clean UX
    const editor = new Editor({
      view: view,
      layerInfos: [{
        layer: myAirports
      }]
    });

    const editorExpand = new Expand({
      view: view,
      content: editor,
      expandIconClass: "esri-icon-edit",
      expandTooltip: "Edit Features",
      group: "primary",
      container: document.createElement("div")
    });

    editorExpand.container.classList.add("basemap-expand");
    view.ui.add(editorExpand, { position: "top-right", index: 3 });

    // Challenge 3: Legend widget
    const legend = new Legend({
      view: view
    });

    const legendExpand = new Expand({
      view: view,
      content: legend,
      expandIconClass: "esri-icon-legend",
      expandTooltip: "Legend",
      group: "primary",
      container: document.createElement("div")
    });

    legendExpand.container.classList.add("basemap-expand");
    view.ui.add(legendExpand, { position: "top-right", index: 4 });

    // --- Widgets ---

    const searchWidget = new Search({ view: view });
    view.ui.add(searchWidget, { position: "top-left", index: 0 });

    const locateBtn = new Locate({ view: view });
    view.ui.add(locateBtn, { position: "top-right", index: 0 });

    const basemapGallery = new BasemapGallery({ view: view });

    const bgExpand = new Expand({
      view: view,
      content: basemapGallery,
      expandIconClass: "esri-icon-basemap",
      expandTooltip: "Change basemap",
      label: "Change basemap",
      group: "primary",
      container: document.createElement("div")
    });

    bgExpand.container.classList.add("basemap-expand");
    view.ui.add(bgExpand, { position: "top-right", index: 1 });

    // Toggle panel for layer visibility
    const toggleDiv = document.createElement("div");
    toggleDiv.style.background = "white";
    toggleDiv.style.padding = "14px";
    toggleDiv.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    toggleDiv.style.fontSize = "13px";
    toggleDiv.style.display = "flex";
    toggleDiv.style.flexDirection = "column";
    toggleDiv.style.gap = "10px";

    const tourismLabel = document.createElement("label");
    tourismLabel.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    tourismLabel.style.fontSize = "13px";
    tourismLabel.style.display = "flex";
    tourismLabel.style.alignItems = "center";
    tourismLabel.style.gap = "8px";
    tourismLabel.style.cursor = "pointer";

    const tourismCheckbox = document.createElement("input");
    tourismCheckbox.type = "checkbox";
    tourismCheckbox.checked = true;
    tourismCheckbox.addEventListener("change", function() {
      tourismLayer.visible = this.checked;
    });

    tourismLabel.appendChild(tourismCheckbox);
    tourismLabel.appendChild(document.createTextNode("Tourism Sites"));

    const airportsLabel = document.createElement("label");
    airportsLabel.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    airportsLabel.style.fontSize = "13px";
    airportsLabel.style.display = "flex";
    airportsLabel.style.alignItems = "center";
    airportsLabel.style.gap = "8px";
    airportsLabel.style.cursor = "pointer";

    const airportsCheckbox = document.createElement("input");
    airportsCheckbox.type = "checkbox";
    airportsCheckbox.checked = true;
    airportsCheckbox.addEventListener("change", function() {
      airportsLayer.visible = this.checked;
    });

    airportsLabel.appendChild(airportsCheckbox);
    airportsLabel.appendChild(document.createTextNode("US Airports"));

    const heliportsLabel = document.createElement("label");
    heliportsLabel.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    heliportsLabel.style.fontSize = "13px";
    heliportsLabel.style.display = "flex";
    heliportsLabel.style.alignItems = "center";
    heliportsLabel.style.gap = "8px";
    heliportsLabel.style.cursor = "pointer";

    const heliportsCheckbox = document.createElement("input");
    heliportsCheckbox.type = "checkbox";
    heliportsCheckbox.checked = true;
    heliportsCheckbox.addEventListener("change", function() {
      heliportsLayer.visible = this.checked;
    });

    heliportsLabel.appendChild(heliportsCheckbox);
    heliportsLabel.appendChild(document.createTextNode("Heliports"));

    toggleDiv.appendChild(tourismLabel);
    toggleDiv.appendChild(airportsLabel);
    toggleDiv.appendChild(heliportsLabel);

    const toggleExpand = new Expand({
      view: view,
      content: toggleDiv,
      expandIconClass: "esri-icon-layer-list",
      expandTooltip: "Toggle Layers",
      group: "primary",
      container: document.createElement("div")
    });

    toggleExpand.container.classList.add("basemap-expand");
    view.ui.add(toggleExpand, { position: "top-right", index: 2 });

    const zoom = new Zoom({ view: view });
    view.ui.add(zoom, { position: "bottom-right" });

  });
  </script>
</body>
</html>
